<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聽音拼字｜多益單字</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
:root{
  --bg:#020e1f; --panel:#071a35; --text:#e0f0ff; --dim:#4a6a8a;
  --cyan:#00d4ff; --amber:#ffd166; --success:#06d6a0; --danger:#ef476f;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  min-height:100%; font-family:'Nunito','Noto Sans TC',sans-serif;
  background:radial-gradient(ellipse at 50% -10%,#0a2a5e 0%,var(--bg) 65%);
  color:var(--text); display:flex; align-items:flex-start;
  justify-content:center; padding:20px;
}

/* 音波背景 */
.wave-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.wave-bg circle{fill:none;stroke:var(--cyan);stroke-width:1;opacity:0;animation:waveOut 4s ease-out infinite;}
@keyframes waveOut{0%{r:20;opacity:.3;}100%{r:200;opacity:0;}}

.stage{position:relative;z-index:1;width:100%;max-width:580px;}

/* HUD */
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.hud-title{
  font-size:17px;font-weight:900;
  background:linear-gradient(90deg,var(--cyan),#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.back-btn{
  font-size:12px;color:var(--dim);background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);border-radius:8px;
  padding:6px 12px;cursor:pointer;text-decoration:none;
  transition:color .15s,border-color .15s;
}
.back-btn:hover{color:var(--cyan);border-color:var(--cyan);}

.stats-row{display:flex;gap:14px;justify-content:space-between;margin-bottom:10px;}
.stat{text-align:center;flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:8px 4px;border:1px solid rgba(255,255,255,.06);}
.stat .val{font-size:22px;font-weight:900;color:var(--amber);font-variant-numeric:tabular-nums;}
.stat .val.danger{color:var(--danger);animation:pulse .5s infinite;}
.stat .lbl{font-size:10px;color:var(--dim);letter-spacing:.08em;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

/* Timer bar */
.timerwrap{height:8px;border-radius:99px;background:rgba(255,255,255,.07);margin-bottom:16px;overflow:hidden;}
.timerbar{height:100%;background:linear-gradient(90deg,var(--cyan),#a78bfa);border-radius:99px;transition:width .3s linear,background .3s;}
.timerbar.urgent{background:linear-gradient(90deg,var(--danger),#ff8787);animation:tpulse .4s infinite;}
@keyframes tpulse{0%,100%{opacity:1;}50%{opacity:.5;}}

/* combo */
.combo-row{height:26px;text-align:center;margin-bottom:10px;font-size:16px;font-weight:900;color:var(--cyan);}
.combo-row.pop{animation:comboIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes comboIn{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}

/* 音波動畫卡 */
.sound-card{
  background:linear-gradient(160deg,#0a2040,#050f20);
  border:1.5px solid rgba(0,212,255,.2);
  border-radius:20px; padding:30px 24px 24px;
  text-align:center; margin-bottom:16px;
  position:relative; overflow:hidden;
}
.sound-card::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(0,212,255,.07) 0%,transparent 65%);
}

/* 音波視覺化 */
.soundwave{display:flex;align-items:center;justify-content:center;gap:4px;height:48px;margin-bottom:16px;}
.soundwave .bar{
  width:5px;border-radius:99px;background:var(--cyan);opacity:.3;
  transform:scaleY(.2);transition:transform .1s,opacity .1s;
}
.soundwave.playing .bar{opacity:.9;}
.soundwave.playing .bar:nth-child(1){animation:wave 0.8s ease infinite;}
.soundwave.playing .bar:nth-child(2){animation:wave 0.8s ease .1s infinite;}
.soundwave.playing .bar:nth-child(3){animation:wave 0.8s ease .2s infinite;}
.soundwave.playing .bar:nth-child(4){animation:wave 0.8s ease .05s infinite;}
.soundwave.playing .bar:nth-child(5){animation:wave 0.8s ease .15s infinite;}
.soundwave.playing .bar:nth-child(6){animation:wave 0.8s ease .25s infinite;}
.soundwave.playing .bar:nth-child(7){animation:wave 0.8s ease .1s infinite;}
.soundwave.playing .bar:nth-child(8){animation:wave 0.8s ease .2s infinite;}
.soundwave.playing .bar:nth-child(9){animation:wave 0.8s ease .3s infinite;}
@keyframes wave{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}

.play-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,rgba(0,212,255,.2),rgba(0,212,255,.08));
  border:1.5px solid rgba(0,212,255,.4);
  border-radius:12px; padding:10px 24px;
  color:var(--cyan); font-size:14px; font-weight:800;
  cursor:pointer; margin-bottom:18px;
  transition:background .15s,transform .1s;
  font-family:inherit;
}
.play-btn:hover{background:rgba(0,212,255,.18);transform:translateY(-2px);}
.play-btn.playing{border-color:var(--amber);color:var(--amber);}

.meaning-text{font-size:28px;font-weight:900;margin-bottom:8px;color:var(--text);}
.pos-tag{
  display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;
  background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3);
  color:var(--cyan);padding:3px 12px;border-radius:999px;margin-bottom:14px;
}
.replay-count{font-size:11px;color:var(--dim);}

/* 輸入 */
.input-zone{margin-bottom:12px;}
.word-input{
  width:100%;padding:16px 18px;font-size:22px;
  font-family:'Consolas','SFMono-Regular',monospace;
  letter-spacing:.08em;background:#060f1e;
  border:2px solid rgba(255,255,255,.1);border-radius:14px;
  color:var(--text);outline:none;text-align:center;
  transition:border-color .15s,box-shadow .15s;
}
.word-input:focus{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(0,212,255,.12);}
.word-input.correct{border-color:var(--success);box-shadow:0 0 0 4px rgba(6,214,160,.15);}
.word-input.wrong{border-color:var(--danger);box-shadow:0 0 0 4px rgba(239,71,111,.15);animation:shake .25s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

.feedback{min-height:22px;text-align:center;font-size:13px;margin-bottom:10px;font-weight:700;}
.hint-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.hint-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:var(--dim);font-size:12px;padding:8px 16px;border-radius:10px;
  cursor:pointer;font-family:inherit;font-weight:700;
  transition:border-color .15s,color .15s;
}
.hint-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.hint-btn:disabled{opacity:.3;cursor:not-allowed;}
.hint-word{
  font-family:'Consolas',monospace;font-size:18px;
  letter-spacing:.25em;color:var(--amber);
  text-align:center;min-height:24px;margin-bottom:10px;
}

/* 進度 */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.progress-label{font-size:11px;color:var(--dim);white-space:nowrap;}
.progress-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),#a78bfa);border-radius:99px;transition:width .4s;}

/* Score pop */
.score-pop{position:fixed;pointer-events:none;font-size:18px;font-weight:900;color:var(--cyan);text-shadow:0 2px 8px rgba(0,0,0,.5);animation:floatUp .9s ease forwards;z-index:100;white-space:nowrap;}
@keyframes floatUp{0%{transform:translateY(0) translateX(-50%);opacity:1;}100%{transform:translateY(-60px) translateX(-50%);opacity:0;}}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(2,14,31,.92);display:flex;align-items:center;justify-content:center;padding:20px;}
.overlay-box{background:linear-gradient(160deg,#061830,#020e1f);border:1.5px solid rgba(0,212,255,.15);border-radius:24px;padding:36px 28px;text-align:center;width:100%;max-width:420px;box-shadow:0 24px 60px -12px rgba(0,0,0,.9);animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.overlay-box h2{font-size:26px;font-weight:900;margin-bottom:8px;}
.overlay-box .sub{font-size:13px;color:var(--dim);line-height:1.8;margin-bottom:24px;}
.big-score{font-size:52px;font-weight:900;background:linear-gradient(90deg,var(--cyan),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.end-stats{display:flex;justify-content:center;gap:20px;margin:12px 0 24px;font-size:12px;color:var(--dim);}
.end-stats b{color:var(--text);font-size:16px;display:block;font-weight:900;}
.big-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:900;cursor:pointer;margin-bottom:10px;font-family:inherit;transition:transform .1s,filter .1s;}
.big-btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.big-btn.primary{background:linear-gradient(180deg,var(--cyan),#0096b3);color:#020e1f;}
.big-btn.secondary{background:rgba(255,255,255,.08);color:var(--text);}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- 音波背景SVG -->
<svg class="wave-bg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <circle cx="300" cy="400" style="animation-delay:0s"/>
  <circle cx="300" cy="400" style="animation-delay:1.3s"/>
  <circle cx="300" cy="400" style="animation-delay:2.6s"/>
</svg>

<div class="stage">
  <div class="hud">
    <div class="hud-title">👂 聽音拼字</div>
    <a class="back-btn" href="index.html">← 返回選單</a>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="val" id="scoreVal">0</div><div class="lbl">SCORE</div></div>
    <div class="stat"><div class="val" id="timerVal">15</div><div class="lbl">SEC</div></div>
    <div class="stat"><div class="val" id="questionVal">1/10</div><div class="lbl">題數</div></div>
    <div class="stat"><div class="val" id="livesVal">❤️❤️❤️</div><div class="lbl">命數</div></div>
  </div>
  <div class="timerwrap"><div class="timerbar" id="timerBar"></div></div>
  <div class="combo-row" id="comboRow"></div>

  <div class="sound-card">
    <div class="soundwave" id="soundwave">
      <div class="bar" style="height:40px"></div>
      <div class="bar" style="height:30px"></div>
      <div class="bar" style="height:50px"></div>
      <div class="bar" style="height:35px"></div>
      <div class="bar" style="height:48px"></div>
      <div class="bar" style="height:28px"></div>
      <div class="bar" style="height:44px"></div>
      <div class="bar" style="height:36px"></div>
      <div class="bar" style="height:40px"></div>
    </div>
    <button class="play-btn" id="playBtn" onclick="playWord()">🔊 播放單字</button>
    <div class="meaning-text" id="meaningText">—</div>
    <div class="pos-tag" id="posTag">n.</div>
    <div class="replay-count" id="replayCount"></div>
  </div>

  <div class="hint-word" id="hintWord"></div>
  <div class="input-zone">
    <input class="word-input" id="wordInput" type="text" autocomplete="off"
           autocapitalize="off" spellcheck="false" placeholder="輸入你聽到的英文單字…">
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="hint-row">
    <button class="hint-btn" id="hintBtn" onclick="useHint()">💡 顯示第一個字母 (−5分)</button>
  </div>
  <div class="progress-row">
    <div class="progress-label" id="progLabel">第 1 關</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progFill" style="width:100%"></div></div>
  </div>
</div>

<!-- 開始 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-box">
    <h2>👂 聽音拼字</h2>
    <div class="sub">
      聽英文單字的發音<br>
      根據中文意思提示，把你聽到的單字拼出來<br><br>
      🔊 可以重複播放，但要快！<br>
      💡 連續答對累積 Combo 加分<br>
      ❤️ 共 3 條命，用完遊戲結束
    </div>
    <button class="big-btn primary" onclick="startGame(1)">開始第 1 關</button>
    <a href="index.html" class="big-btn secondary" style="display:block;text-decoration:none;padding:14px;border-radius:14px;font-size:15px;font-weight:900;background:rgba(255,255,255,.08);color:var(--text);">← 返回選單</a>
  </div>
</div>

<!-- 結束 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-box">
    <h2 id="endTitle">🎉 過關！</h2>
    <div class="big-score" id="endScore">0</div>
    <div class="end-stats">
      <div>答對<b id="endCorrect">0</b>題</div>
      <div>最高連擊<b id="endCombo">0</b></div>
      <div>本關最佳<b id="endBest">0</b></div>
    </div>
    <button class="big-btn primary" id="endNextBtn" onclick="endNext()">下一關 ▶</button>
    <button class="big-btn secondary" onclick="restartLevel()">重玩此關</button>
    <a href="index.html" style="display:block;margin-top:8px;font-size:12px;color:var(--dim);text-align:center;text-decoration:none;">← 返回選單</a>
  </div>
</div>

<script>
const WORDS=[
  ["negotiate","negotiate","協商·談判","v."],["invoice","invoice","發票","n."],
  ["budget","budget","預算","n."],["candidate","candidate","應徵者","n."],
  ["warehouse","warehouse","倉庫","n."],["agenda","agenda","議程","n."],
  ["merge","merge","合併","v."],["revenue","revenue","營收","n."],
  ["deadline","deadline","截止日期","n."],["inventory","inventory","庫存","n."],
  ["client","client","客戶","n."],["contract","contract","合約","n."],
  ["expense","expense","費用","n."],["promote","promote","升遷·推廣","v."],
  ["recruit","recruit","招募","v."],["supplier","supplier","供應商","n."],
  ["draft","draft","草稿","n."],["forecast","forecast","預測","n."],
  ["feedback","feedback","回饋","n."],["accountant","accountant","會計師","n."],
  ["shipment","shipment","運送貨物","n."],["proposal","proposal","提案","n."],
  ["quarter","quarter","季度","n."],["salary","salary","薪水","n."],
  ["vacant","vacant","空缺的","adj."],["renew","renew","續約","v."],
  ["refund","refund","退款","n."],["discount","discount","折扣","n."],
  ["resign","resign","辭職","v."],["colleague","colleague","同事","n."],
  ["headquarters","headquarters","總部","n."],["itinerary","itinerary","行程表","n."],
  ["luggage","luggage","行李","n."],["delay","delay","延遲","n."],
  ["reimburse","reimburse","報銷","v."],["attain","attain","達成","v."],
  ["allocate","allocate","分配","v."],["benefit","benefit","福利","n."],
  ["committee","committee","委員會","n."],["consult","consult","諮詢","v."],
  ["distribute","distribute","分發","v."],["efficient","efficient","有效率的","adj."],
  ["estimate","estimate","估計","n."],["evaluate","evaluate","評估","v."],
  ["exceed","exceed","超過","v."],["exhibit","exhibit","展覽","n."],
  ["expand","expand","擴展","v."],["facility","facility","設施","n."],
  ["fund","fund","資金","n."],["guarantee","guarantee","保證","n."],
  ["implement","implement","實施","v."],["instruct","instruct","指示","v."],
  ["launch","launch","推出","v."],["maintain","maintain","維持","v."],
  ["manufacture","manufacture","製造","v."],["notify","notify","通知","v."],
  ["obtain","obtain","獲得","v."],["overdue","overdue","逾期的","adj."],
  ["permit","permit","許可","n."],["personnel","personnel","人事部門","n."],
  ["postpone","postpone","延後","v."],["productivity","productivity","生產力","n."],
  ["qualify","qualify","使合格","v."],["recommend","recommend","推薦","v."],
  ["register","register","登記","v."],["release","release","發布","v."],
  ["reliable","reliable","可靠的","adj."],["replace","replace","取代","v."],
  ["request","request","要求","n."],["require","require","需要","v."],
  ["reservation","reservation","預訂","n."],["resolve","resolve","解決","v."],
  ["retail","retail","零售","n."],["retain","retain","保留","v."],
  ["revise","revise","修改","v."],["schedule","schedule","行程排程","n."],
  ["statement","statement","結算單","n."],["submit","submit","提交","v."],
  ["subscribe","subscribe","訂閱","v."],["substantial","substantial","大量的","adj."],
  ["sufficient","sufficient","足夠的","adj."],["supervisor","supervisor","主管","n."],
  ["surplus","surplus","盈餘","n."],["transaction","transaction","交易","n."],
  ["vendor","vendor","供應商·賣方","n."],["venue","venue","場地","n."],
  ["warranty","warranty","保固","n."],["withdraw","withdraw","提款","v."]
];

const LEVEL_SIZE=10, ROUND_TIME=15;
let levelIndex=1, questionIndex=0, levelWords=[];
let currentWord=null, score=0, lives=3, combo=0, maxCombo=0;
let correctCount=0, timeLeft=ROUND_TIME, timerID=null;
let replayCount=0, revealedCount=0, bestScores={};
let answering=true;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── 音效
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getACtx(){if(!actx)actx=new AudioCtx();return actx;}
function playTone(freq,type='sine',dur=.12,vol=.18){
  try{const a=getACtx();const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dur);
  o.start();o.stop(a.currentTime+dur);}catch(e){}
}
function sfxCorrect(){playTone(880,'sine',.08,.2);setTimeout(()=>playTone(1100,'sine',.08,.2),80);}
function sfxWrong(){playTone(200,'square',.15,.2);}
function sfxCombo(n){playTone(440+n*60,'triangle',.18,.25);}

// ── TTS
function speakWord(word){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US';u.rate=0.85;u.pitch=1;
  const sw=document.getElementById('soundwave');
  const btn=document.getElementById('playBtn');
  sw.classList.add('playing');btn.classList.add('playing');btn.textContent='🔊 播放中…';
  u.onend=()=>{sw.classList.remove('playing');btn.classList.remove('playing');btn.textContent='🔊 再播一次';};
  window.speechSynthesis.speak(u);
}

function playWord(){
  if(!currentWord)return;
  replayCount++;
  document.getElementById('replayCount').textContent=replayCount>1?`已重播 ${replayCount} 次`:'';
  speakWord(currentWord[1]);
}

// ── 關卡
function startGame(lv){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  levelIndex=lv;
  const start=((lv-1)*LEVEL_SIZE)%WORDS.length;
  levelWords=[];
  for(let i=0;i<LEVEL_SIZE;i++)levelWords.push(WORDS[(start+i)%WORDS.length]);
  levelWords=shuffle(levelWords);
  score=0;lives=3;combo=0;maxCombo=0;correctCount=0;questionIndex=0;
  document.getElementById('progLabel').textContent='第 '+lv+' 關';
  updateLivesUI();updateScoreUI();updateComboUI();
  loadQuestion();
}

function loadQuestion(){
  if(questionIndex>=LEVEL_SIZE){endGame(true);return;}
  currentWord=levelWords[questionIndex];
  replayCount=0;revealedCount=0;answering=true;
  document.getElementById('meaningText').textContent=currentWord[2];
  document.getElementById('posTag').textContent=currentWord[3];
  document.getElementById('hintWord').textContent='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').style.color='';
  document.getElementById('replayCount').textContent='';
  document.getElementById('questionVal').textContent=(questionIndex+1)+'/'+LEVEL_SIZE;
  document.getElementById('progFill').style.width=(questionIndex/LEVEL_SIZE*100)+'%';
  const inp=document.getElementById('wordInput');
  inp.value='';inp.className='word-input';inp.disabled=false;
  document.getElementById('hintBtn').disabled=false;

  // 播放音訊
  setTimeout(()=>{ replayCount=1; speakWord(currentWord[1]); document.getElementById('replayCount').textContent=''; },400);

  // 計時
  clearInterval(timerID);
  timeLeft=ROUND_TIME;
  updateTimerUI();
  timerID=setInterval(()=>{
    timeLeft--;updateTimerUI();
    if(timeLeft<=0){clearInterval(timerID);handleTimeout();}
  },1000);
}

function updateTimerUI(){
  document.getElementById('timerVal').textContent=timeLeft;
  const pct=timeLeft/ROUND_TIME*100;
  document.getElementById('timerBar').style.width=pct+'%';
  const urgent=timeLeft<=5;
  document.getElementById('timerBar').classList.toggle('urgent',urgent);
  document.getElementById('timerVal').classList.toggle('danger',urgent);
}
function updateLivesUI(){
  document.getElementById('livesVal').textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
}
function updateScoreUI(){document.getElementById('scoreVal').textContent=score;}
function updateComboUI(){
  const el=document.getElementById('comboRow');
  if(combo>=2){
    const labels=['','','NICE! ×2','GREAT! ×3','AMAZING! ×4','PERFECT! ×5'];
    el.textContent=combo<labels.length?labels[combo]:'🔥 GODLIKE! ×'+combo;
    el.classList.add('pop');
    sfxCombo(combo);
  } else { el.textContent='';el.classList.remove('pop'); }
}

// ── 輸入
document.getElementById('wordInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&answering){
    const val=e.target.value.trim().toLowerCase();
    if(!val)return;
    if(val===currentWord[0]){handleCorrect();}
    else{handleWrong();}
  }
});

function handleCorrect(){
  clearInterval(timerID);answering=false;
  combo++;maxCombo=Math.max(maxCombo,combo);correctCount++;
  const mult=Math.min(combo,5);
  const timeBonus=Math.floor(timeLeft/ROUND_TIME*30);
  const gained=50*mult+timeBonus;
  score+=gained;
  updateScoreUI();updateComboUI();sfxCorrect();
  const inp=document.getElementById('wordInput');
  inp.classList.add('correct');inp.disabled=true;
  document.getElementById('feedback').style.color='var(--success)';
  document.getElementById('feedback').textContent='✓ 正確！ +'+gained+(mult>1?' (連擊×'+mult+')':'');
  spawnPop('+'+gained,(mult>1?' ×'+mult:''));
  questionIndex++;
  setTimeout(loadQuestion,800);
}

function handleWrong(){
  const inp=document.getElementById('wordInput');
  inp.classList.add('wrong');
  setTimeout(()=>inp.classList.remove('wrong'),350);
  inp.value='';
  document.getElementById('feedback').style.color='var(--danger)';
  document.getElementById('feedback').textContent='✗ 再試試看！';
  sfxWrong();
  combo=0;updateComboUI();
}

function handleTimeout(){
  answering=false;
  const inp=document.getElementById('wordInput');
  inp.disabled=true;
  document.getElementById('feedback').style.color='var(--danger)';
  document.getElementById('feedback').textContent='時間到！正確答案：'+currentWord[1];
  speakWord(currentWord[1]);
  combo=0;updateComboUI();
  lives--;updateLivesUI();
  if(lives<=0){setTimeout(()=>endGame(false),1000);return;}
  questionIndex++;
  setTimeout(loadQuestion,1400);
}

function useHint(){
  if(revealedCount>=currentWord[0].length)return;
  revealedCount++;
  const hintArr=currentWord[0].split('').map((c,i)=>i<revealedCount?c.toUpperCase():'_');
  document.getElementById('hintWord').textContent=hintArr.join(' ');
  score=Math.max(0,score-5);updateScoreUI();
  if(revealedCount>=currentWord[0].length-1)document.getElementById('hintBtn').disabled=true;
}

function spawnPop(text,sub){
  const card=document.querySelector('.sound-card');
  const rect=card.getBoundingClientRect();
  const div=document.createElement('div');
  div.className='score-pop';
  div.textContent=text+sub;
  div.style.left=rect.left+rect.width/2+'px';
  div.style.top=rect.top+40+'px';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),900);
}

function endGame(cleared){
  clearInterval(timerID);
  const best=bestScores[levelIndex]||0;
  bestScores[levelIndex]=Math.max(best,score);
  try{localStorage.setItem('audioSpellBest_'+levelIndex,bestScores[levelIndex]);}catch(e){}
  document.getElementById('endTitle').textContent=cleared?'🎉 全部答完！':'💔 沒命了…';
  document.getElementById('endScore').textContent=score;
  document.getElementById('endCorrect').textContent=correctCount;
  document.getElementById('endCombo').textContent=maxCombo;
  document.getElementById('endBest').textContent=bestScores[levelIndex];
  const nb=document.getElementById('endNextBtn');
  if(cleared&&levelIndex<9){nb.textContent='下一關 ▶';nb.classList.remove('hidden');}
  else if(levelIndex>=9){nb.textContent='從頭來過 ▶';nb.classList.remove('hidden');}
  else{nb.classList.add('hidden');}
  document.getElementById('endOverlay').classList.remove('hidden');
}
function endNext(){document.getElementById('endOverlay').classList.add('hidden');startGame(levelIndex<9?levelIndex+1:1);}
function restartLevel(){document.getElementById('endOverlay').classList.add('hidden');startGame(levelIndex);}
</script>
</body>
</html>
