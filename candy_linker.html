<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖果連連看｜多益單字</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
:root{
  --bg:#1a0533; --panel:#231040; --text:#f0e8ff; --dim:#8877aa;
  --amber:#ffd166; --success:#06d6a0; --danger:#ef476f;
}
.c0{--tc:#ff6b6b;--tt:#fff;} .c1{--tc:#ff9f43;--tt:#fff;} .c2{--tc:#ffd43b;--tt:#333;}
.c3{--tc:#69db7c;--tt:#1a3a23;} .c4{--tc:#4dabf7;--tt:#0c2a45;} .c5{--tc:#748ffc;--tt:#fff;}
.c6{--tc:#da77f2;--tt:#fff;} .c7{--tc:#f783ac;--tt:#fff;} .c8{--tc:#38d9a9;--tt:#0a2e22;}
.c9{--tc:#a9e34b;--tt:#1e3a05;} .c10{--tc:#ff8787;--tt:#fff;} .c11{--tc:#20c997;--tt:#fff;}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  min-height:100%; font-family:'Nunito','Noto Sans TC',sans-serif;
  background:radial-gradient(ellipse at 50% -5%,#3d1278 0%,var(--bg) 65%);
  color:var(--text); display:flex; align-items:flex-start; justify-content:center; padding:16px;
}
.candy-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.candy-bg span{position:absolute;top:-60px;animation:fall linear infinite;opacity:.15;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}
.stage{position:relative;z-index:1;width:100%;max-width:600px;}

/* HUD */
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hud-title{font-size:18px;font-weight:900;background:linear-gradient(90deg,#f9c74f,#f72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hud-right{display:flex;gap:12px;align-items:center;}
.stat{text-align:center;}
.stat .val{font-size:22px;font-weight:900;color:var(--amber);font-variant-numeric:tabular-nums;}
.stat .lbl{font-size:10px;color:var(--dim);letter-spacing:.08em;}
.stat .val.danger{color:var(--danger);animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

/* Combo */
.combo-banner{
  text-align:center;height:28px;margin-bottom:6px;
  font-size:18px;font-weight:900;letter-spacing:.05em;
  transition:opacity .3s;
}
.combo-banner.visible{animation:comboIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes comboIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}

/* Fever */
body.fever .grid-wrap{animation:feverGlow 1s ease infinite alternate;}
@keyframes feverGlow{from{box-shadow:0 0 20px #f72585;}to{box-shadow:0 0 40px #ffd166,0 0 80px #f72585;}}
body.fever .tile{animation:feverWiggle .4s ease infinite alternate;}
@keyframes feverWiggle{from{transform:rotate(-1deg);}to{transform:rotate(1deg);}}

/* Timer bar */
.timerwrap{height:10px;border-radius:99px;background:rgba(255,255,255,.08);margin-bottom:10px;overflow:hidden;position:relative;}
.timerbar{height:100%;background:linear-gradient(90deg,#f72585,#ffd166);border-radius:99px;transition:width .5s linear,background .5s;}
.timerbar.urgent{background:linear-gradient(90deg,#ef476f,#ff8787);animation:timerPulse .4s infinite;}
@keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* 關卡 + 進度 */
.level-label{text-align:center;font-size:11px;font-weight:700;letter-spacing:.15em;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
.progwrap{height:6px;border-radius:99px;background:rgba(255,255,255,.07);margin-bottom:10px;overflow:hidden;}
.progbar{height:100%;background:linear-gradient(90deg,#4361ee,#4cc9f0);border-radius:99px;transition:width .4s ease;}

/* Grid */
.grid-wrap{position:relative;background:rgba(255,255,255,.04);border-radius:18px;padding:10px;border:1px solid rgba(255,255,255,.07);}
.grid{display:grid;gap:7px;}
canvas#lineCanvas{position:absolute;inset:0;pointer-events:none;border-radius:18px;}

/* Tile */
.tile{
  background:var(--tc);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  text-align:center;font-weight:800;color:var(--tt);
  cursor:pointer;user-select:none;padding:4px 6px;line-height:1.2;
  box-shadow:0 4px 0 rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.3);
  transition:transform .08s,filter .08s,opacity .3s,box-shadow .1s;
  position:relative;overflow:hidden;
}
.tile::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.2);border-radius:12px 12px 50% 50%;pointer-events:none;}
.tile:hover:not(.empty){transform:translateY(-2px);filter:brightness(1.1);}
.tile.selected{transform:scale(1.07) translateY(-3px);box-shadow:0 0 0 3px #fff,0 6px 0 rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.3);}
.tile.matched{opacity:0;transform:scale(.5);pointer-events:none;transition:opacity .3s,transform .3s;}
.tile.wrong{animation:twrong .35s ease;}
@keyframes twrong{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.tile.empty{visibility:hidden;pointer-events:none;}
.tile.hint-flash{animation:hintPulse .5s ease 3;}
@keyframes hintPulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.8) drop-shadow(0 0 10px #fff);}}
.tile .word{font-size:clamp(9px,1.8vw,12px);}
.tile .type-badge{position:absolute;top:2px;right:4px;font-size:8px;opacity:.45;font-weight:700;}

/* 飛分動畫 */
.score-pop{
  position:fixed;pointer-events:none;font-size:20px;font-weight:900;
  color:#ffd166;text-shadow:0 2px 8px rgba(0,0,0,.5);
  animation:floatUp .9s ease forwards;z-index:100;white-space:nowrap;
}
@keyframes floatUp{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-70px);opacity:0;}}

/* 粒子 */
.particle{
  position:fixed;pointer-events:none;border-radius:50%;
  animation:particleBurst .6s ease forwards;z-index:99;
}
@keyframes particleBurst{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
}

/* 底部按鈕 */
.bottom-row{display:flex;gap:10px;margin-top:12px;}
.btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.04em;transition:transform .1s,filter .1s;font-family:inherit;}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn.primary{background:linear-gradient(180deg,#f72585,#b5179e);color:#fff;box-shadow:0 4px 0 #7b0d6e;}
.btn.secondary{background:rgba(255,255,255,.1);color:var(--text);box-shadow:0 4px 0 rgba(0,0,0,.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* Power-up 標示 */
.powerup-badge{
  text-align:center;font-size:12px;color:var(--amber);font-weight:700;
  height:20px;margin-bottom:4px;letter-spacing:.04em;
}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(15,5,30,.9);display:flex;align-items:center;justify-content:center;padding:20px;}
.overlay-box{background:linear-gradient(160deg,#2d1060,#1a0533);border:1.5px solid rgba(255,255,255,.12);border-radius:24px;padding:36px 28px;text-align:center;width:100%;max-width:400px;box-shadow:0 24px 60px -12px rgba(0,0,0,.8);animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.overlay-box h2{font-size:26px;font-weight:900;margin-bottom:6px;}
.overlay-box .sub{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:22px;}
.big-score{font-size:52px;font-weight:900;background:linear-gradient(90deg,var(--amber),#f72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.stats-row{display:flex;justify-content:center;gap:20px;margin:10px 0 22px;font-size:12px;color:var(--dim);}
.stats-row b{color:var(--text);font-size:16px;display:block;font-weight:900;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="candy-bg" id="candyBg"></div>
<div class="stage">
  <div class="hud">
    <div class="hud-title">🍬 糖果連連看</div>
    <div class="hud-right">
      <div class="stat"><div class="val" id="scoreVal">0</div><div class="lbl">SCORE</div></div>
      <div class="stat"><div class="val" id="timerVal">90</div><div class="lbl">SEC</div></div>
      <div class="stat"><div class="val" id="pairVal">10</div><div class="lbl">剩餘對</div></div>
    </div>
  </div>
  <div class="timerwrap"><div class="timerbar" id="timerBar" style="width:100%"></div></div>
  <div class="combo-banner" id="comboBanner"></div>
  <div class="powerup-badge" id="powerupBadge"></div>
  <div class="level-label" id="levelLabel">第 1 關</div>
  <div class="progwrap"><div class="progbar" id="progBar" style="width:100%"></div></div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
    <canvas id="lineCanvas"></canvas>
  </div>
  <div class="bottom-row">
    <button class="btn secondary" onclick="useHint()">💡 提示 (−20)</button>
    <button class="btn secondary" onclick="reshuffleBoard()">🔀 重排 (−10)</button>
    <button class="btn primary" onclick="nextLevel()">下一關 ▶</button>
  </div>
</div>

<!-- 開始 -->
<div class="overlay" id="startOverlay">
  <div class="overlay-box">
    <h2>🍬 糖果連連看</h2>
    <div class="sub">
      點英文 → 點對應的中文意思<br>路線最多轉 2 個彎就消除！<br><br>
      🔥 快速連消觸發 <b>COMBO</b> 加乘<br>
      ⚡ 連消 5 對進入 <b>FEVER 模式</b>！
    </div>
    <button class="btn primary" style="width:100%;margin-bottom:10px;" onclick="startGame(1)">開始第 1 關 ▶</button>
    <div style="color:var(--dim);font-size:12px;">共 9 關 · 每關 10 對多益單字</div>
  </div>
</div>

<!-- 結束 -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-box">
    <h2 id="endTitle">🎉 過關！</h2>
    <div class="big-score" id="endScore">0</div>
    <div class="stats-row">
      <div>消除<b id="endPairs">0</b>對</div>
      <div>最高連擊<b id="endCombo">0</b></div>
      <div>本關最佳<b id="endBest">0</b></div>
    </div>
    <button class="btn primary" style="width:100%;margin-bottom:10px;" id="endNextBtn" onclick="endNext()">下一關 ▶</button>
    <button class="btn secondary" style="width:100%;" onclick="restartFromEnd()">重玩此關</button>
  </div>
</div>

<script>
// ── 音效 (Web Audio API)
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx(){ if(!actx) actx = new AudioCtx(); return actx; }
function playTone(freq, type='sine', dur=0.12, vol=0.18){
  try{
    const a = getACtx();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.connect(gain); gain.connect(a.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.start(); osc.stop(a.currentTime + dur);
  }catch(e){}
}
function sfxMatch(){ playTone(880,'sine',.09,.2); setTimeout(()=>playTone(1100,'sine',.09,.2),90); }
function sfxCombo(n){ playTone(440+n*80,'triangle',.15,.25); }
function sfxFever(){ playTone(660,'sawtooth',.08,.3); setTimeout(()=>playTone(880,'sawtooth',.08,.3),80); setTimeout(()=>playTone(1100,'sawtooth',.12,.3),160); }
function sfxWrong(){ playTone(220,'square',.12,.15); }
function sfxClear(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',.2,.3),i*90)); }

// ── 單字庫
const WORDS = [
  ["negotiate","negotiate","協商·談判"],["invoice","invoice","發票"],
  ["budget","budget","預算"],["candidate","candidate","應徵者"],
  ["warehouse","warehouse","倉庫"],["agenda","agenda","議程"],
  ["merge","merge","合併"],["revenue","revenue","營收"],
  ["deadline","deadline","截止日期"],["inventory","inventory","庫存"],
  ["client","client","客戶"],["contract","contract","合約"],
  ["expense","expense","費用"],["promote","promote","升遷·推廣"],
  ["recruit","recruit","招募"],["supplier","supplier","供應商"],
  ["draft","draft","草稿"],["forecast","forecast","預測"],
  ["feedback","feedback","回饋"],["accountant","accountant","會計師"],
  ["shipment","shipment","運送貨物"],["proposal","proposal","提案"],
  ["quarter","quarter","季度"],["salary","salary","薪水"],
  ["vacant","vacant","空缺的"],["renew","renew","續約"],
  ["refund","refund","退款"],["discount","discount","折扣"],
  ["resign","resign","辭職"],["colleague","colleague","同事"],
  ["headquarters","headquarters","總部"],["itinerary","itinerary","行程表"],
  ["luggage","luggage","行李"],["delay","delay","延遲"],
  ["reimburse","reimburse","報銷"],["attain","attain","達成"],
  ["allocate","allocate","分配"],["benefit","benefit","福利"],
  ["committee","committee","委員會"],["consult","consult","諮詢"],
  ["distribute","distribute","分發"],["efficient","efficient","有效率的"],
  ["estimate","estimate","估計"],["evaluate","evaluate","評估"],
  ["exceed","exceed","超過"],["exhibit","exhibit","展覽"],
  ["expand","expand","擴展"],["facility","facility","設施"],
  ["fund","fund","資金"],["guarantee","guarantee","保證"],
  ["implement","implement","實施"],["instruct","instruct","指示"],
  ["launch","launch","推出"],["maintain","maintain","維持"],
  ["manufacture","manufacture","製造"],["notify","notify","通知"],
  ["obtain","obtain","獲得"],["overdue","overdue","逾期的"],
  ["permit","permit","許可"],["personnel","personnel","人事部門"],
  ["postpone","postpone","延後"],["productivity","productivity","生產力"],
  ["qualify","qualify","使合格"],["recommend","recommend","推薦"],
  ["register","register","登記"],["release","release","發布"],
  ["reliable","reliable","可靠的"],["replace","replace","取代"],
  ["request","request","要求"],["require","require","需要"],
  ["reservation","reservation","預訂"],["resolve","resolve","解決"],
  ["retail","retail","零售"],["retain","retain","保留"],
  ["revise","revise","修改"],["schedule","schedule","行程排程"],
  ["statement","statement","結算單"],["submit","submit","提交"],
  ["subscribe","subscribe","訂閱"],["substantial","substantial","大量的"],
  ["sufficient","sufficient","足夠的"],["supervisor","supervisor","主管"],
  ["surplus","surplus","盈餘"],["transaction","transaction","交易"],
  ["vendor","vendor","供應商·賣方"],["venue","venue","場地"],
  ["warranty","warranty","保固"],["withdraw","withdraw","提款"]
];

const COLS=5, ROWS=5, LEVEL_SIZE=10, BASE_TIME=90;

let levelIndex=1, grid=[], selected=null, score=0, pairsLeft=0;
let timeLeft=BASE_TIME, totalTime=BASE_TIME, timerID=null;
let bestScores={}, matchedPairs=0;
let combo=0, maxCombo=0, lastMatchTime=0;
let fever=false, feverCount=0;
const COMBO_WINDOW=3500; // ms內消下一對才算combo

const gridEl=document.getElementById('grid');
const canvas=document.getElementById('lineCanvas');
const ctx=canvas.getContext('2d');
const scoreVal=document.getElementById('scoreVal');
const timerVal=document.getElementById('timerVal');
const pairVal=document.getElementById('pairVal');
const progBar=document.getElementById('progBar');
const timerBar=document.getElementById('timerBar');
const levelLabel=document.getElementById('levelLabel');
const comboBanner=document.getElementById('comboBanner');
const powerupBadge=document.getElementById('powerupBadge');

// 漂浮背景
(function(){
  const e=['🍬','🍭','🍫','🍩','🎂','🧁','🍰','🍮','🍦','⭐'];
  const bg=document.getElementById('candyBg');
  for(let i=0;i<20;i++){
    const s=document.createElement('span');
    s.textContent=e[i%e.length];
    s.style.left=Math.random()*100+'%';
    s.style.animationDuration=(8+Math.random()*14)+'s';
    s.style.animationDelay=(-Math.random()*20)+'s';
    s.style.fontSize=(16+Math.random()*18)+'px';
    bg.appendChild(s);
  }
})();

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── 關卡建立
function startGame(lv){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  levelIndex=lv; buildLevel(lv);
}

function buildLevel(lv){
  clearInterval(timerID);
  document.body.classList.remove('fever');
  fever=false; feverCount=0; combo=0; maxCombo=0;
  score=0; matchedPairs=0; selected=null;
  lastMatchTime=0;
  levelLabel.textContent='第 '+lv+' 關';
  comboBanner.textContent=''; comboBanner.classList.remove('visible');
  powerupBadge.textContent='';
  updateScoreUI();

  const start=((lv-1)*LEVEL_SIZE)%WORDS.length;
  const lvWords=[];
  for(let i=0;i<LEVEL_SIZE;i++) lvWords.push(WORDS[(start+i)%WORDS.length]);

  let tiles=[];
  lvWords.forEach((w,i)=>{
    const color=i%12;
    tiles.push({key:w[0],label:w[1],color,type:'en'});
    tiles.push({key:w[0],label:w[2],color,type:'zh'});
  });
  tiles=shuffle(tiles);

  const positions=shuffle([...Array(ROWS*COLS).keys()]);
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  tiles.forEach((t,i)=>{
    const p=positions[i]; t.r=0|p/COLS; t.c=p%COLS;
    grid[t.r][t.c]=t;
  });

  pairsLeft=LEVEL_SIZE;
  totalTime=BASE_TIME+lv*5;
  timeLeft=totalTime;
  renderGrid(); startTimer(); resizeCanvas();
}

function renderGrid(){
  gridEl.innerHTML='';
  gridEl.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  pairVal.textContent=pairsLeft;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const t=grid[r][c];
      const div=document.createElement('div');
      div.style.height='54px';
      if(!t){ div.className='tile empty'; }
      else {
        div.className=`tile c${t.color}`;
        div.innerHTML=`<span class="word">${t.label}</span><span class="type-badge">${t.type==='en'?'EN':'中'}</span>`;
        div.onclick=()=>clickTile(r,c);
        t.el=div;
      }
      gridEl.appendChild(div);
    }
  }
}

function resizeCanvas(){
  const w=document.querySelector('.grid-wrap');
  canvas.width=w.offsetWidth; canvas.height=w.offsetHeight;
}

// ── 計時器
function startTimer(){
  updateTimerUI();
  timerID=setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if(timeLeft<=0){clearInterval(timerID);endGame(false);}
  },1000);
}
function updateTimerUI(){
  timerVal.textContent=timeLeft;
  const pct=timeLeft/totalTime*100;
  timerBar.style.width=pct+'%';
  const urgent=timeLeft<=15;
  timerBar.classList.toggle('urgent',urgent);
  timerVal.classList.toggle('danger',urgent);
}

// ── 點擊
function clickTile(r,c){
  const t=grid[r][c]; if(!t) return;
  if(selected&&selected.r===r&&selected.c===c){
    t.el.classList.remove('selected'); selected=null; return;
  }
  if(!selected){ selected=t; t.el.classList.add('selected'); return; }

  const a=selected, b=t;
  selected=null; a.el.classList.remove('selected');

  if(a.key!==b.key||a.type===b.type){
    a.el.classList.add('wrong'); b.el.classList.add('wrong');
    setTimeout(()=>{a.el.classList.remove('wrong');b.el.classList.remove('wrong');},400);
    sfxWrong();
    // 斷 combo
    combo=0; updateComboBanner();
    return;
  }

  const path=findPath(a.r,a.c,b.r,b.c);
  if(!path){
    a.el.classList.add('wrong'); b.el.classList.add('wrong');
    setTimeout(()=>{a.el.classList.remove('wrong');b.el.classList.remove('wrong');},400);
    sfxWrong();
    combo=0; updateComboBanner();
    return;
  }

  // ── 配對成功
  const now=Date.now();
  if(now-lastMatchTime<COMBO_WINDOW&&lastMatchTime>0){ combo++; }
  else { combo=1; }
  lastMatchTime=now;
  maxCombo=Math.max(maxCombo,combo);

  // 分數：base + combo bonus + fever bonus
  const base=100;
  const comboBonus=combo>1?(combo-1)*30:0;
  const feverBonus=fever?50:0;
  const gained=base+comboBonus+feverBonus;
  score+=gained;

  // Fever 累計
  feverCount++;
  if(feverCount>=5&&!fever){ triggerFever(); }

  sfxMatch(); if(combo>=3) sfxCombo(combo);

  // 畫連線
  const color=`hsl(${a.color*30},90%,65%)`;
  drawPath(path,color);
  spawnParticles(a.el,color);
  spawnParticles(b.el,color);
  spawnScorePop(b.el,'+'+gained+(combo>=2?' ×'+combo:''),color);

  updateComboBanner();
  updateScoreUI();

  setTimeout(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    a.el.classList.add('matched'); b.el.classList.add('matched');
    grid[a.r][a.c]=null; grid[b.r][b.c]=null;
    pairsLeft--; matchedPairs++;
    pairVal.textContent=pairsLeft;
    progBar.style.width=(pairsLeft/LEVEL_SIZE*100)+'%';
    if(pairsLeft===0){ setTimeout(()=>endGame(true),400); sfxClear(); }
  },380);
}

function updateScoreUI(){ scoreVal.textContent=score; }

// ── Combo Banner
function updateComboBanner(){
  if(combo>=2){
    const labels=['','','NICE! ×2','GREAT! ×3','AWESOME! ×4','INCREDIBLE! ×5','🔥 UNSTOPPABLE! ×'+combo];
    const txt=combo<labels.length?labels[combo]:'🔥 GODLIKE! ×'+combo;
    comboBanner.textContent=txt;
    comboBanner.classList.add('visible');
  } else {
    comboBanner.textContent='';
    comboBanner.classList.remove('visible');
  }
}

// ── Fever 模式
function triggerFever(){
  fever=true;
  document.body.classList.add('fever');
  sfxFever();
  powerupBadge.textContent='⚡ FEVER MODE — 每對 +50 分！';
  setTimeout(()=>{
    fever=false; feverCount=0;
    document.body.classList.remove('fever');
    powerupBadge.textContent='';

// ── 飛分動畫
function spawnScorePop(el,text,color){
  const rect=el.getBoundingClientRect();
  const div=document.createElement('div');
  div.className='score-pop';
  div.textContent=text;
  div.style.left=rect.left+rect.width/2+'px';
  div.style.top=rect.top+'px';
  div.style.color=color;
  div.style.transform='translateX(-50%)';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),900);
}

// ── 粒子爆炸
function spawnParticles(el,color){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<10;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=5+Math.random()*7;
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*50;
    p.style.cssText=`width:${size}px;height:${size}px;background:${color};
      left:${cx}px;top:${cy}px;
      --dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),650);
  }
}

// ── 路徑
function isEmpty(r,c){
  if(r<0||r>=ROWS||c<0||c>=COLS) return true;
  return grid[r][c]===null;
}
function clearRow(r,c1,c2){
  const lo=Math.min(c1,c2)+1,hi=Math.max(c1,c2)-1;
  for(let c=lo;c<=hi;c++) if(!isEmpty(r,c)) return false;
  return true;
}
function clearCol(c,r1,r2){
  const lo=Math.min(r1,r2)+1,hi=Math.max(r1,r2)-1;
  for(let r=lo;r<=hi;r++) if(!isEmpty(r,c)) return false;
  return true;
}
function findPath(r1,c1,r2,c2){
  if(r1===r2&&clearRow(r1,c1,c2)) return [{r:r1,c:c1},{r:r2,c:c2}];
  if(c1===c2&&clearCol(c1,r1,r2)) return [{r:r1,c:c1},{r:r2,c:c2}];
  if(isEmpty(r1,c2)&&clearRow(r1,c1,c2)&&clearCol(c2,r1,r2)) return [{r:r1,c:c1},{r:r1,c:c2},{r:r2,c:c2}];
  if(isEmpty(r2,c1)&&clearCol(c1,r1,r2)&&clearRow(r2,c1,c2)) return [{r:r1,c:c1},{r:r2,c:c1},{r:r2,c:c2}];
  for(let r=-1;r<=ROWS;r++){
    if(r===r1||r===r2) continue;
    if(isEmpty(r,c1)&&isEmpty(r,c2)&&clearCol(c1,r1,r)&&clearRow(r,c1,c2)&&clearCol(c2,r,r2))
      return [{r:r1,c:c1},{r:r,c:c1},{r:r,c:c2},{r:r2,c:c2}];
  }
  for(let c=-1;c<=COLS;c++){
    if(c===c1||c===c2) continue;
    if(isEmpty(r1,c)&&isEmpty(r2,c)&&clearRow(r1,c1,c)&&clearCol(c,r1,r2)&&clearRow(r2,c,c2))
      return [{r:r1,c:c1},{r:r1,c:c},{r:r2,c:c},{r:r2,c:c2}];
  }
  return null;
}

// ── 畫線
function drawPath(path,color){
  resizeCanvas(); ctx.clearRect(0,0,canvas.width,canvas.height);
  const pad=10,gap=7;
  const cellW=(canvas.width-pad*2-gap*(COLS-1))/COLS;
  const cellH=54;
  function center(r,c){ return {x:pad+c*(cellW+gap)+cellW/2, y:pad+r*(cellH+gap)+cellH/2}; }
  ctx.lineWidth=6; ctx.strokeStyle=color; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.shadowColor=color; ctx.shadowBlur=16; ctx.globalAlpha=.9;
  ctx.beginPath();
  path.forEach((pt,i)=>{const{x,y}=center(pt.r,pt.c); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke(); ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ── 提示
function useHint(){
  for(let r1=0;r1<ROWS;r1++) for(let c1=0;c1<COLS;c1++){
    const a=grid[r1][c1]; if(!a) continue;
    for(let r2=0;r2<ROWS;r2++) for(let c2=0;c2<COLS;c2++){
      if(r1===r2&&c1===c2) continue;
      const b=grid[r2][c2]; if(!b) continue;
      if(a.key!==b.key||a.type===b.type) continue;
      if(findPath(r1,c1,r2,c2)){
        a.el.classList.add('hint-flash'); b.el.classList.add('hint-flash');
        setTimeout(()=>{a.el.classList.remove('hint-flash');b.el.classList.remove('hint-flash');},1600);
        score=Math.max(0,score-20); updateScoreUI();
        return;
      }
    }
  }
  reshuffleBoard();
}

// ── 重排
function reshuffleBoard(){
  ctx.clearRect(0,0,canvas.width,canvas.height); selected=null;
  const tiles=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]) tiles.push(grid[r][c]);
  const positions=shuffle([...Array(ROWS*COLS).keys()]);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) grid[r][c]=null;
  tiles.forEach((t,i)=>{const p=positions[i];t.r=0|p/COLS;t.c=p%COLS;grid[t.r][t.c]=t;});
  renderGrid(); score=Math.max(0,score-10); updateScoreUI();
}

function nextLevel(){ startGame(levelIndex<9?levelIndex+1:1); }

// ── 結束
function endGame(cleared){
  clearInterval(timerID);
  document.body.classList.remove('fever');
  const best=bestScores[levelIndex]||0;
  bestScores[levelIndex]=Math.max(best,score);
  try{localStorage.setItem('candyBest_'+levelIndex,bestScores[levelIndex]);}catch(e){}
  document.getElementById('endTitle').textContent=cleared?'🎉 全部消完！':'⏰ 時間到！';
  document.getElementById('endScore').textContent=score;
  document.getElementById('endPairs').textContent=matchedPairs;
  document.getElementById('endCombo').textContent=maxCombo;
  document.getElementById('endBest').textContent=bestScores[levelIndex];
  const nb=document.getElementById('endNextBtn');
  if(cleared&&levelIndex<9){nb.textContent='下一關 ▶';nb.classList.remove('hidden');}
  else if(levelIndex>=9){nb.textContent='從頭來過 ▶';nb.classList.remove('hidden');}
  else{nb.classList.add('hidden');}
  document.getElementById('endOverlay').classList.remove('hidden');
}
function endNext(){ document.getElementById('endOverlay').classList.add('hidden'); startGame(levelIndex<9?levelIndex+1:1); }
function restartFromEnd(){ document.getElementById('endOverlay').classList.add('hidden'); startGame(levelIndex); }
window.addEventListener('resize',resizeCanvas);
</script>
